repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
        # The human devcontainer.json is JSONC (comments), and everything
        # under .devcontainer/stoker/ is stoker-generated (the derived
        # devcontainer.json + the stoker-sandbox feature manifest carry
        # comment headers). stoker validates that tree via `stoker doctor`.
        exclude: ^\.devcontainer/(devcontainer\.json$|stoker/)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.6
    hooks:
      - id: uv-lock
