# Built-in default dashboard template configuration.
#
# This file is the contract loaded by ``BuiltInTemplateSource`` and
# parsed by ``parse_template_toml``. Future GitHub-backed sources will
# ship the same shape.

[dashboard]
template = "dashboard.html.jinja"

[dashboard.assets]
css = ["dashboard.css"]
js = ["dashboard.js"]
images = ["logo.svg", "favicon.png"]

[switcher]
include_kinds = ["main", "release", "major", "alternate"]
